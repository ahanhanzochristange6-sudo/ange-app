name: ange
description: ANGE - Lecteur multimédia puissant pour musiques et films.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  just_audio: ^0.9.42
  video_player: ^2.9.1
  on_audio_query: ^2.9.0
  photo_manager: ^3.6.0
  permission_handler: ^11.3.1
  sqflite: ^2.3.3+2
  path: ^1.9.0
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  animate_do: ^4.2.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  intl: ^0.19.0
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/icon.png
